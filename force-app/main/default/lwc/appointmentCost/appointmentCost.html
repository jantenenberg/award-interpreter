<template>
    <lightning-quick-action-panel header="Appointment Cost">

        <template if:true={isLoading}>
            <div class="slds-is-relative" style="min-height: 120px;">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_small" role="alert">
                <span>{errorMessage}</span>
            </div>
        </template>

        <template if:false={isLoading}>
        <template if:true={appointmentLoaded}>

            <!-- ─── APPOINTMENT BANNER ────────────────────────────────────────── -->
            <div class="ca-resource-banner">
                <div class="ca-resource-banner-left">
                    <lightning-icon icon-name="standard:service_appointment" size="x-small" class="ca-resource-icon"></lightning-icon>
                    <span>Cost for <strong>{participantName}</strong></span>
                </div>
                <span class={statusBadgeClass}>{appointmentStatus}</span>
            </div>

            <!-- ─── DATE SELECTION ───────────────────────────────────────────── -->
            <div class="ca-section-header">DATE SELECTION</div>
            <div class="ca-section-body">
                <div class="slds-form-element slds-m-bottom_x-small">
                    <label class="slds-form-element__label">
                        <abbr class="slds-required" title="required">*</abbr> Dates to use for calculation
                    </label>
                    <div class="ca-type-group">
                        <template for:each={dateSetOptions} for:item="opt">
                            <button key={opt.value} class={opt.buttonClass} data-value={opt.value}
                                    disabled={opt.disabled} onclick={handleDateSetChange} type="button">
                                {opt.label}
                            </button>
                        </template>
                    </div>
                </div>
                <template if:true={selectedDateStart}>
                    <div class="ca-date-preview">
                        <lightning-icon icon-name="utility:clock" size="xx-small" class="ca-date-icon"></lightning-icon>
                        <span>{selectedDateStart} → {selectedDateEnd}</span>
                    </div>
                </template>
                <template if:false={selectedDateStart}>
                    <p class="slds-text-color_weak slds-text-body_small">No dates available for the selected option.</p>
                </template>
            </div>

            <!-- Warning for resources without award config -->
            <template if:true={hasResourcesWithoutAward}>
                <div class="ca-warning-banner slds-m-bottom_x-small">
                    <lightning-icon icon-name="utility:warning" size="xx-small"></lightning-icon>
                    <span>Some resources have no Award Configuration linked — they are excluded from the calculation.</span>
                </div>
            </template>

            <!-- ─── PER-RESOURCE SECTIONS (post-calc) ───────────────────────── -->
            <template if:true={hasResults}>
                <template for:each={resourcePanels} for:item="rp">
                <div key={rp.resourceId}>

                    <!-- Section header (collapsible toggle) -->
                    <div class="ca-res-section-header"
                         data-resource-id={rp.resourceId}
                         onclick={handleToggleResource}>
                        <div class="ca-res-section-left">
                            <lightning-icon icon-name={rp.toggleIcon} size="xx-small" class="ca-toggle-icon"></lightning-icon>
                            <span class="ca-res-section-name">{rp.resourceName}</span>
                            <span class={rp.empBadgeClass}>{rp.employmentType}</span>
                        </div>
                        <span class="ca-res-section-cost">{rp.grossPayFormatted}</span>
                    </div>

                    <!-- Expanded body -->
                    <template if:true={rp.isExpanded}>
                    <div class="ca-res-section-body">

                        <!-- Sub-header: Cost breakdown -->
                        <div class="ca-res-subheader">
                            <span>COST BREAKDOWN</span>
                            <span class="ca-res-subheader-meta">{rp.classification} · Lvl {rp.classificationLevel} · {rp.paidHours}h · {rp.dayType}</span>
                        </div>

                        <table class="ca-segment-table">
                            <thead>
                                <tr>
                                    <th class="ca-th">Description</th>
                                    <th class="ca-th ca-th_right">Hrs</th>
                                    <th class="ca-th ca-th_right">Rate</th>
                                    <th class="ca-th ca-th_right">Cost</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={rp.segments} for:item="seg">
                                    <tr key={seg.description}>
                                        <td class="ca-td">{seg.description}</td>
                                        <td class="ca-td ca-td_right">{seg.hours}</td>
                                        <td class="ca-td ca-td_right">{seg.rateFormatted}</td>
                                        <td class="ca-td ca-td_right">{seg.costFormatted}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>

                        <template if:true={rp.hasBackendWarnings}>
                            <div class="ca-warning-banner ca-warning-banner_sm slds-m-top_x-small">
                                <lightning-icon icon-name="utility:warning" size="xx-small"></lightning-icon>
                                <span>{rp.backendWarningText}</span>
                            </div>
                        </template>

                        <!-- Sub-header: Calculation notes -->
                        <div class="ca-res-subheader ca-res-subheader_notes">CALCULATION NOTES</div>

                        <!-- Rules applied -->
                        <template if:true={rp.hasAppliedRules}>
                            <div class="ca-notes-group-label ca-notes-group-label_green">
                                <lightning-icon icon-name="utility:check" size="xx-small" class="ca-notes-group-icon_green"></lightning-icon>
                                Rules Applied
                            </div>
                            <ul class="ca-notes-list">
                                <template for:each={rp.appliedRules} for:item="rule">
                                    <li key={rule.id} class="ca-notes-item ca-notes-item_applied">
                                        <lightning-icon icon-name="utility:check" size="xx-small" class="ca-notes-icon_green"></lightning-icon>
                                        <span>{rule.text}</span>
                                    </li>
                                </template>
                            </ul>
                        </template>

                        <!-- Warnings -->
                        <template if:true={rp.hasNoteWarnings}>
                            <div class="ca-notes-group-label ca-notes-group-label_amber">
                                <lightning-icon icon-name="utility:warning" size="xx-small" class="ca-notes-group-icon_amber"></lightning-icon>
                                Warnings &amp; Unapplied Rules
                            </div>
                            <ul class="ca-notes-list">
                                <template for:each={rp.noteWarnings} for:item="warn">
                                    <li key={warn.id} class="ca-notes-item ca-notes-item_warn">
                                        <lightning-icon icon-name="utility:warning" size="xx-small" class="ca-notes-icon_amber"></lightning-icon>
                                        <span>{warn.text}</span>
                                    </li>
                                </template>
                            </ul>
                        </template>

                        <!-- Cost comparison -->
                        <template if:true={rp.hasAdjustedCost}>
                            <div class="ca-notes-comparison">
                                <div class="ca-notes-comparison-title">Cost Comparison</div>
                                <div class="ca-notes-comparison-row">
                                    <span class="ca-notes-comparison-label">As calculated (no break deducted)</span>
                                    <span class="ca-notes-comparison-value">{rp.grossPayFormatted}</span>
                                </div>
                                <div class="ca-notes-comparison-row ca-notes-comparison-row_adjusted">
                                    <span class="ca-notes-comparison-label">Est. if 30-min meal break applied</span>
                                    <span class="ca-notes-comparison-value ca-notes-comparison-value_adjusted">{rp.adjustedCostFormatted}</span>
                                </div>
                                <div class="ca-notes-comparison-detail">
                                    Saving: {rp.savingFormatted} — {rp.adjustmentDetail}
                                </div>
                            </div>
                        </template>

                    </div>
                    </template><!-- /isExpanded -->

                </div>
                </template><!-- /for:each resourcePanels -->

                <!-- Total bar -->
                <div class="ca-total-bar">
                    <span class="ca-total-label">TOTAL · {totalHours}h</span>
                    <span class="ca-total-amount">{totalCostFormatted}</span>
                </div>
                <template if:true={showAdjustedTotal}>
                    <div class="ca-total-bar ca-total-bar_adjusted">
                        <span class="ca-total-label">EST. ADJUSTED TOTAL</span>
                        <span class="ca-total-amount ca-total-amount_adjusted">{adjustedTotalFormatted}</span>
                    </div>
                </template>

            </template><!-- /hasResults -->

        </template><!-- /appointmentLoaded -->
        </template><!-- /if:false isLoading -->

        <div slot="footer">
            <lightning-button label="Close" onclick={handleClose}></lightning-button>
        </div>

    </lightning-quick-action-panel>
</template>
