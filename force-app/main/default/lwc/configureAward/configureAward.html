<template>
    <lightning-quick-action-panel header="Configure Award">

        <template if:true={isLoading}>
            <div class="slds-is-relative" style="min-height: 120px;">
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </div>
        </template>

        <template if:true={errorMessage}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_small" role="alert">
                <span>{errorMessage}</span>
            </div>
        </template>

        <template if:false={isLoading}>

            <!-- ─── RESOURCE BANNER (no section header) ───────────────────────── -->
            <div class="ca-resource-banner">
                <div class="ca-resource-banner-left">
                    <template if:true={resourceName}>
                        <lightning-icon icon-name="standard:contact" size="x-small" class="ca-resource-icon"></lightning-icon>
                        <span>Configuring award for <strong>{resourceName}</strong></span>
                    </template>
                    <template if:false={resourceName}>
                        <lightning-icon icon-name="utility:warning" size="x-small" class="ca-resource-icon ca-resource-icon_warn"></lightning-icon>
                        <span class="slds-text-color_weak">No resource linked to this record.</span>
                    </template>
                </div>
                <template if:true={isPrimary}>
                    <span class="ca-primary-badge">
                        <lightning-icon icon-name="utility:check" size="xx-small" class="ca-primary-badge-icon"></lightning-icon>
                        Primary
                    </span>
                </template>
            </div>

            <!-- ─── AWARD SELECTION ───────────────────────────────────────────── -->
            <div class="ca-section-header">AWARD SELECTION</div>
            <div class="ca-section-body">

                <div class="slds-form slds-form_stacked">
                    <div class="slds-form-element slds-m-bottom_x-small">
                        <lightning-combobox
                            label="Award"
                            placeholder="Select an award..."
                            options={awardOptions}
                            value={selectedAwardCode}
                            onchange={handleAwardChange}
                            required>
                        </lightning-combobox>
                    </div>

                    <!-- Employment Type — inline button group -->
                    <div class="slds-form-element slds-m-bottom_x-small">
                        <label class="slds-form-element__label">
                            <abbr class="slds-required" title="required">*</abbr> Employment Type
                        </label>
                        <div class="ca-type-group">
                            <template for:each={employmentTypeOptions} for:item="opt">
                                <button
                                    key={opt.value}
                                    class={opt.buttonClass}
                                    data-value={opt.value}
                                    onclick={handleEmploymentTypeButtonClick}
                                    type="button">
                                    {opt.label}
                                </button>
                            </template>
                        </div>
                    </div>

                    <template if:true={showClassifications}>
                        <div class="slds-form-element">
                            <lightning-combobox
                                label="Classification"
                                placeholder="Select classification..."
                                options={classificationOptions}
                                value={selectedClassificationValue}
                                onchange={handleClassificationChange}
                                required>
                            </lightning-combobox>
                        </div>
                    </template>

                    <template if:true={loadingClassifications}>
                        <div class="ca-inline-spinner">
                            <lightning-spinner size="x-small" alternative-text="Loading classifications"></lightning-spinner>
                            <span class="slds-text-body_small slds-text-color_weak">Loading classifications...</span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- ─── SELECTED CLASSIFICATION — collapsible ─────────────────────── -->
            <template if:true={showClassificationSummary}>

                <!-- Clickable header with toggle -->
                <div class="ca-section-header ca-section-header_toggle" onclick={handleToggleClassification}>
                    <span>SELECTED CLASSIFICATION</span>
                    <lightning-icon
                        icon-name={classificationToggleIcon}
                        size="xx-small"
                        class="ca-toggle-icon">
                    </lightning-icon>
                </div>

                <!-- Compact summary (always visible) -->
                <div class="ca-section-body">
                <div class="ca-cl-compact">
                    <div class="ca-cl-compact-left">
                        <span class="ca-cl-compact-name">{selectedClassification}</span>
                        <span class="ca-cl-compact-meta">Level {selectedClassificationLevel} &bull; {selectedAwardCode}</span>
                        <template if:true={isCasual}>
                            <span class="ca-casual-badge ca-casual-badge_sm">CA loading applied</span>
                        </template>
                    </div>
                    <div class="ca-cl-compact-right">
                        <lightning-input
                            type="number"
                            value={editableRate}
                            min="0"
                            step="0.0001"
                            formatter="currency"
                            onchange={handleRateChange}
                            variant="label-hidden"
                            class="ca-rate-input-compact">
                        </lightning-input>
                        <span class="ca-rate-unit">/{calculatedRateTypeLabel} — editable</span>
                    </div>
                </div>
                </div>

                <!-- Expandable details -->
                <template if:true={classificationExpanded}>
                    <div class="ca-section-body ca-section-body_details">
                    <div class="ca-classification-panel">

                        <!-- Row 1: classification details -->
                        <div class="ca-classification-grid">
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Award</span>
                                <span class="ca-detail-value">{selectedAwardCode} – {selectedAwardName}</span>
                            </div>
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Classification</span>
                                <span class="ca-detail-value">{selectedClassification}</span>
                            </div>
                            <div class="ca-cl-item ca-cl-item_narrow">
                                <span class="ca-detail-label">Level</span>
                                <span class="ca-detail-value">{selectedClassificationLevel}</span>
                            </div>
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Base rate</span>
                                <span class="ca-detail-value">{baseRateLabel}</span>
                            </div>
                        </div>

                        <!-- Row 2: meta fields -->
                        <div class="ca-classification-meta">
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Employment type</span>
                                <span class="ca-detail-value">{selectedEmploymentType}</span>
                            </div>
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Base rate type</span>
                                <span class="ca-detail-value">{apiBaseRateType}</span>
                            </div>
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Calculated rate type</span>
                                <span class="ca-detail-value">{calculatedRateTypeLabel}</span>
                            </div>
                            <div class="ca-cl-item">
                                <span class="ca-detail-label">Clauses</span>
                                <span class="ca-detail-value slds-text-color_weak">—</span>
                            </div>
                        </div>

                    </div>
                    </div>
                </template>

            </template>

            <!-- ─── LOADING AND DATES ─────────────────────────────────────────── -->
            <div class="ca-section-header">LOADING AND DATES</div>
            <div class="ca-section-body">
                <div class="ca-field-row">
                    <template if:true={isCasual}>
                        <div class="ca-field-col">
                            <lightning-input
                                type="number"
                                label="Casual Loading %"
                                value={casualLoadingPercent}
                                min="0"
                                max="100"
                                step="0.01"
                                onchange={handleCasualLoadingChange}
                                required>
                            </lightning-input>
                        </div>
                    </template>
                    <div class="ca-field-col">
                        <lightning-input
                            type="date"
                            label="Effective Date"
                            value={effectiveDate}
                            onchange={handleEffectiveDateChange}
                            required>
                        </lightning-input>
                    </div>
                </div>
            </div>

        </template>

        <div slot="footer">
            <lightning-button
                label="Cancel"
                onclick={handleCancel}
                class="slds-m-right_x-small">
            </lightning-button>
            <lightning-button
                label="Set as Primary"
                onclick={handleSetAsPrimary}
                disabled={isSetAsPrimaryDisabled}
                class="slds-m-right_x-small">
            </lightning-button>
            <lightning-button
                variant="brand"
                label="Save Configuration"
                onclick={handleSave}
                disabled={isSaveDisabled}>
            </lightning-button>
        </div>

    </lightning-quick-action-panel>
</template>
